name: Deploy Backend (Render)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "supabase/migrations/**"
      - "render.yaml"

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  test:
    name: Pre-deploy tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app/ worker/

      - name: Unit tests
        run: pytest tests/unit/ -v --timeout=30
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-key-not-real
          SUPABASE_JWT_SECRET: test-jwt-secret-32-chars-padding!!
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pm_sidekick_test
          GROQ_API_KEY: gsk_test_key_not_real_for_unit_tests
          APP_ENV: test

  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Deploy API service
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_API_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Deploy worker service
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_WORKER_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Wait for API deploy
        run: |
          echo "Waiting 60s for Render deploy to complete..."
          sleep 60

      - name: Smoke check API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.API_BASE_URL }}/healthz)
          if [ "$STATUS" != "200" ]; then
            echo "API health check failed: $STATUS"
            exit 1
          fi
          READY=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.API_BASE_URL }}/readyz)
          if [ "$READY" != "200" ]; then
            echo "API readiness check failed: $READY"
            exit 1
          fi
          echo "Backend deploy verified"
