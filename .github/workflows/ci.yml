name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend linting + type check ──────────────────────────────────────────
  backend-lint:
    name: Backend lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app/ worker/ tests/

      - name: Ruff format check
        run: ruff format --check app/ worker/ tests/

      - name: Mypy
        run: mypy app/ worker/


  # ── Backend unit tests ────────────────────────────────────────────────────
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=app --cov=worker --cov-report=xml --timeout=30
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-key-not-real
          SUPABASE_JWT_SECRET: test-jwt-secret-32-chars-padding!!
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pm_sidekick_test
          GROQ_API_KEY: gsk_test_key_not_real_for_unit_tests
          APP_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend-unit
          fail_ci_if_error: false


  # ── Backend integration tests ─────────────────────────────────────────────
  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.base_ref == 'main'
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pm_sidekick_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Apply migrations
        run: psql $DATABASE_URL -f ../supabase/migrations/001_initial_schema.sql -f ../supabase/migrations/003_indexes.sql
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pm_sidekick_test

      - name: Run integration tests
        run: pytest tests/integration/ -v --timeout=30 -m integration
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-key-not-real
          SUPABASE_JWT_SECRET: test-jwt-secret-32-chars-padding!!
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pm_sidekick_test
          GROQ_API_KEY: gsk_test_key_not_real_for_unit_tests
          APP_ENV: test


  # ── Frontend type check + build ───────────────────────────────────────────
  frontend-check:
    name: Frontend type check & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://test.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key
          VITE_API_BASE_URL: http://localhost:8000


  # ── Docker build smoke test ───────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: pm-sidekick-api:ci

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.worker
          push: false
          tags: pm-sidekick-worker:ci
