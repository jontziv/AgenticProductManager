services:
  # ── Single web service: FastAPI API + embedded worker + React frontend ───────
  - type: web
    name: pm-sidekick
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerContext: ..
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL_FAST
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: GROQ_MODEL_STRUCTURED
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: GROQ_MODEL_SYNTHESIS
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: GROQ_MODEL_EVAL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: GROQ_MODEL_AUDIO
        value: whisper-large-v3-turbo
      - key: GROQ_MODEL_AUDIO_FALLBACK
        value: whisper-large-v3
      - key: GROQ_INTER_CALL_SLEEP
        value: "10"
      - key: LANGSMITH_ENABLED
        value: "false"
      - key: OTEL_ENABLED
        value: "false"
      - key: EXPORT_STORAGE_BUCKET
        value: exports
      - key: WORKER_POLL_INTERVAL_SECONDS
        value: "5"
      - key: WORKER_MAX_RETRIES
        value: "3"
      - key: WORKER_CONCURRENCY
        value: "2"
    healthCheckPath: /healthz
    autoDeploy: true
