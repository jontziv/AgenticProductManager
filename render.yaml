services:
  # ── Single web service: FastAPI API + embedded worker + React frontend ───────
  - type: web
    name: pm-sidekick
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    # Build context is the repo root so the Dockerfile can access both
    # the frontend source (package.json, src/) and the backend (backend/).
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL_FAST
        value: llama-3.1-8b-instant
      - key: GROQ_MODEL_STRUCTURED
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_SYNTHESIS
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_EVAL
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_AUDIO
        value: whisper-large-v3-turbo
      - key: GROQ_MODEL_AUDIO_FALLBACK
        value: whisper-large-v3
      - key: LANGSMITH_ENABLED
        value: "false"
      - key: OTEL_ENABLED
        value: "false"
      - key: EXPORT_STORAGE_BUCKET
        value: exports
      - key: WORKER_POLL_INTERVAL_SECONDS
        value: "5"
      - key: WORKER_MAX_RETRIES
        value: "3"
      - key: WORKER_CONCURRENCY
        value: "2"
    healthCheckPath: /healthz
    autoDeploy: true
