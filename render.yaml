services:
  # ── Backend API (+ embedded worker on free tier) ───────────────────────────
  - type: web
    name: pm-sidekick-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL_FAST
        value: llama-3.1-8b-instant
      - key: GROQ_MODEL_STRUCTURED
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_SYNTHESIS
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_EVAL
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_AUDIO
        value: whisper-large-v3-turbo
      - key: GROQ_MODEL_AUDIO_FALLBACK
        value: whisper-large-v3
      - key: LANGSMITH_ENABLED
        value: "false"
      - key: OTEL_ENABLED
        value: "false"
      - key: EXPORT_STORAGE_BUCKET
        value: exports
      - key: WORKER_POLL_INTERVAL_SECONDS
        value: "5"
      - key: WORKER_MAX_RETRIES
        value: "3"
      - key: WORKER_CONCURRENCY
        value: "2"
      - key: EMBEDDED_WORKER
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /healthz
    autoDeploy: true

  # ── Frontend static site ───────────────────────────────────────────────────
  - type: web
    name: pm-sidekick-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://cvrxuvyiequsheqvszhu.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2cnh1dnlpZXF1c2hlcXZzemh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTIyMjgsImV4cCI6MjA5MTM4ODIyOH0.JkdJXN6HRzjRxqp_0AZOezkCMG-xZ-6vQ7PHq2W0b8U
      - key: VITE_API_BASE_URL
        value: https://agenticproductmanager.onrender.com/api/v1
    autoDeploy: true
